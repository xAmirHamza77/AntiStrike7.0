<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0099CC"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFB020"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="64" fill="#0A0E17"/>
  <!-- Shield -->
  <path d="M256 80 L380 140 L380 280 C380 360 330 410 256 440 C182 410 132 360 132 280 L132 140 Z"
        fill="none" stroke="url(#cyanGrad)" stroke-width="6" filter="url(#glow)"/>
  <path d="M256 100 L360 152 L360 275 C360 345 315 388 256 412 C197 388 152 345 152 275 L152 152 Z"
        fill="#00D4FF08" stroke="#00D4FF33" stroke-width="2"/>
  <!-- Lightning strike -->
  <path d="M270 160 L230 250 L260 250 L242 340 L310 230 L275 230 L300 160 Z"
        fill="url(#amberGrad)" filter="url(#glow)"/>
  <!-- Accent ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#7B61FF22" stroke-width="1" stroke-dasharray="8 12"/>
</svg>